version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shigosag
    ports:
      - "5432:5432"

  backend:
    build: ./server
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    build: ./client
    ports:
      - "5173:5173"